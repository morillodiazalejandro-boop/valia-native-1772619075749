workflows:
  appthunder-build:
    name: AppThunder Native Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - apple_credentials
      java: 17
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Generate Native Assets
        script: |
          npm install @capacitor/assets --save-dev
          npx capacitor-assets generate --iconBackgroundColor '#ffffff' --splashBackgroundColor '#ffffff'
      - name: AppThunder Initialization
        script: |
          rm -rf ios android
          npx cap add android || true
          npx cap add ios || true
          npx cap sync

      - name: Build Android (.aab)
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || echo $JAVA_HOME)
          cd android && ./gradlew bundleRelease
      - name: Build iOS (.ipa)
        script: |
          # 1. Detect the Bundle ID automatically
          BUNDLE_ID=$(xcode-project detect-bundle-id)
          
          # 2. Fetch signing files from Apple (uses the secure env variables automatically)
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          
          # 3. Set up the local macOS keychain
          keychain initialize
          keychain add-certificates
          
          # 4. Apply profiles (This generates the missing export_options.plist!)
          xcode-project use-profiles
          
          # 5. Build the .ipa
          if [ -d "ios/App/App.xcworkspace" ]; then
            xcode-project build-ipa --workspace "ios/App/App.xcworkspace" --scheme "App"
          else
            xcode-project build-ipa --project "ios/App/App.xcodeproj" --scheme "App"
          fi
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        issuer_id: $APP_STORE_ISSUER_ID
        key_id: $APP_STORE_KEY_ID
        api_key: $APP_STORE_PRIVATE_KEY
